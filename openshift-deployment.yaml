apiVersion: apps/v1
kind: Deployment
metadata:
  name: visual-flow-builder
  labels:
    app: visual-flow-builder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visual-flow-builder
  template:
    metadata:
      labels:
        app: visual-flow-builder
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: visual-flow-builder
        image: ${IMAGE_REGISTRY}/${NAMESPACE}/visual-flow-builder:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: visual-flow-builder-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          timeoutSeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: visual-flow-builder
  labels:
    app: visual-flow-builder
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: visual-flow-builder
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: visual-flow-builder
spec:
  to:
    kind: Service
    name: visual-flow-builder
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect 