apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: visual-flow-builder
spec:
  output:
    to:
      kind: ImageStreamTag
      name: visual-flow-builder:latest
  source:
    git:
      uri: ${GIT_REPOSITORY_URL}
      ref: ${GIT_BRANCH}
    contextDir: my-app
  strategy:
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers:
    - type: ConfigChange
    - type: ImageChange
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: visual-flow-builder 